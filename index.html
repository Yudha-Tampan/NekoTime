<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NekoTime — Jadwal Anime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            neko: {
              50: '#fff0f9',
              100: '#ffdcf3',
              200: '#ffbce8',
              300: '#ff8fd5',
              400: '#ff52bc',
              500: '#ff1fa3',
              600: '#f0008a',
              700: '#c90073',
              800: '#a6005f',
              900: '#890051',
            },
            dark: {
              50: '#f8f8f8',
              100: '#ececec',
              200: '#d4d4d4',
              300: '#ababab',
              400: '#6e6e6e',
              500: '#3d3d3d',
              600: '#2a2a2a',
              700: '#1e1e1e',
              800: '#141414',
              900: '#0a0a0a',
              950: '#050505',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s ease-in-out infinite',
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 1.5s infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-down': 'slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'fade-in': 'fadeIn 0.3s ease',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-8px)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            slideDown: { '0%': { transform: 'translateY(-20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            scaleIn: { '0%': { transform: 'scale(0.92)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
          },
          backdropBlur: { xs: '2px' },
          boxShadow: {
            'glow': '0 0 20px rgba(255, 31, 163, 0.3)',
            'glow-lg': '0 0 40px rgba(255, 31, 163, 0.4)',
            'card': '0 4px 24px rgba(0,0,0,0.4)',
            'card-hover': '0 8px 40px rgba(0,0,0,0.6)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --accent: #ff1fa3;
      --accent-dim: rgba(255,31,163,0.15);
    }
    html[data-theme="light"] {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ebebeb;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f0f0;
      --border: rgba(0,0,0,0.08);
      --text-primary: #111111;
      --text-secondary: #666666;
      --accent: #d4007a;
      --accent-dim: rgba(212,0,122,0.1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    .font-display { font-family: 'Syne', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Cards */
    .anime-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s, background 0.2s;
    }
    .anime-card:hover {
      transform: translateY(-4px) scale(1.01);
      background: var(--bg-card-hover);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,31,163,0.15);
    }

    /* Bottom nav */
    .bottom-nav {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }
    html[data-theme="light"] .bottom-nav {
      background: rgba(245,245,245,0.92);
    }

    /* Active nav */
    .nav-item.active .nav-icon { color: var(--accent); }
    .nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
    .nav-item.active .nav-indicator { opacity: 1; transform: scaleX(1); }
    .nav-indicator {
      height: 2px; border-radius: 99px;
      background: var(--accent);
      opacity: 0; transform: scaleX(0.4);
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      width: 24px; margin: 0 auto;
    }

    /* Accent gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #ff1fa3, #ff6eb4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }

    /* Schedule tab */
    .day-tab.active {
      background: var(--accent);
      color: white;
    }
    .day-tab {
      background: var(--bg-card);
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    /* Genre badge */
    .genre-badge {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(255,31,163,0.2);
    }

    /* Modal */
    .modal-overlay {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.hide { animation: slideDown 0.3s ease forwards; opacity: 0; }

    /* Rating stars */
    .rating-bar {
      background: linear-gradient(90deg, #ff1fa3, #ff6eb4);
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    /* Character avatar */
    .char-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .char-avatar:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }
    .char-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Trailer embed */
    .trailer-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
    }
    .trailer-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* Countdown badge */
    .countdown-chip {
      font-family: 'Syne', monospace;
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    /* Sticky day header */
    .sticky-day-header {
      position: sticky;
      top: 60px;
      z-index: 10;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
    }

    /* Light mode card */
    html[data-theme="light"] .anime-card {
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    html[data-theme="light"] .anime-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
    }

    /* Favorite heart */
    .fav-btn.active svg { fill: var(--accent); color: var(--accent); }

    /* Search bar */
    .search-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-bar::placeholder { color: var(--text-secondary); }

    /* Profile card */
    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    /* Ongoing poster */
    .ongoing-poster {
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    /* Infinite scroll sentinel */
    #scroll-sentinel { height: 1px; }

    /* Scroll container */
    .main-scroll {
      height: calc(100vh - 64px);
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    /* Header gradient */
    .header-bg {
      background: linear-gradient(135deg, rgba(255,31,163,0.15) 0%, transparent 60%);
    }

    /* Live clock */
    #live-clock {
      font-family: 'Syne', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Airing status */
    .status-airing { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status-upcoming { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .status-done { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }

    /* Multi select genre filter */
    .genre-filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .genre-filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Sort btn */
    .sort-btn.active { background: var(--accent); color: white; }
    .sort-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.2s;
    }
  </style>
</head>
<body>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Live Clock Bar -->
<div id="top-bar" class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 border-b header-bg" style="border-color:var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(12px);">
  <div class="flex items-center gap-2">
    <span class="font-display font-bold text-base gradient-text">NekoTime</span>
    <span class="text-xs px-2 py-0.5 rounded-full genre-badge font-semibold">LIVE</span>
  </div>
  <div class="flex items-center gap-3">
    <span id="live-clock" class="text-xs" style="color:var(--text-secondary)"></span>
    <button id="theme-toggle" class="w-8 h-8 rounded-full flex items-center justify-center transition-all hover:scale-110" style="background:var(--bg-card);border:1px solid var(--border);">
      <svg id="theme-icon-dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</div>

<!-- Main Content -->
<div class="pt-[44px] pb-[64px]">

  <!-- JADWAL PAGE -->
  <div id="page-jadwal" class="page active">
    <!-- Search & header -->
    <div class="px-4 pt-4 pb-2">
      <h1 class="font-display font-bold text-xl mb-3">Jadwal Tayang</h1>
      <!-- Day filter tabs -->
      <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="day-tabs">
        <!-- Filled by JS -->
      </div>
    </div>
    <!-- Schedule list -->
    <div id="schedule-list" class="px-4 pb-4"></div>
  </div>

  <!-- ANIME PAGE -->
  <div id="page-anime" class="page">
    <!-- Search -->
    <div class="px-4 pt-4 pb-2 sticky top-[44px] z-20" style="background:var(--bg-primary);">
      <div class="relative mb-3">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--text-secondary)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="text" placeholder="Cari anime..." class="search-bar w-full pl-9 pr-4 py-2.5 rounded-xl text-sm" />
      </div>
      <!-- Genre filter -->
      <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar" id="genre-filters">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Sort bar -->
    <div class="px-4 pb-3 flex items-center gap-2">
      <span class="text-xs font-medium" style="color:var(--text-secondary)">Sort:</span>
      <button class="sort-btn active text-xs px-3 py-1 rounded-full font-medium" data-sort="POPULARITY_DESC">Populer</button>
      <button class="sort-btn text-xs px-3 py-1 rounded-full font-medium" data-sort="SCORE_DESC">Rating</button>
      <button class="sort-btn text-xs px-3 py-1 rounded-full font-medium" data-sort="TRENDING_DESC">Trending</button>
    </div>

    <!-- Tabs: Ongoing / Upcoming -->
    <div class="px-4 flex gap-1 mb-4">
      <button id="tab-ongoing" class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all" style="background:var(--accent);color:white;">Ongoing</button>
      <button id="tab-upcoming" class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all" style="background:var(--bg-card);color:var(--text-secondary)">Upcoming</button>
    </div>

    <!-- Search results -->
    <div id="search-results" class="px-4 pb-4 hidden"></div>

    <!-- Ongoing list -->
    <div id="ongoing-list" class="px-4 pb-4 grid grid-cols-2 gap-3"></div>

    <!-- Upcoming list -->
    <div id="upcoming-list" class="px-4 pb-4 hidden"></div>
    <div id="scroll-sentinel"></div>
    <div id="load-more-spinner" class="hidden flex justify-center py-6">
      <div class="w-6 h-6 border-2 rounded-full animate-spin" style="border-color:var(--bg-card);border-top-color:var(--accent);"></div>
    </div>
  </div>

  <!-- PROFILE PAGE -->
  <div id="page-profile" class="page">
    <div class="px-4 pt-6">
      <!-- Profile header -->
      <div class="profile-card rounded-2xl p-6 mb-4 text-center">
        <div class="relative inline-block mb-4">
          <img src="owner.jpg" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=OblivionX&backgroundColor=1a1a2e'" alt="OblivionX" class="w-24 h-24 rounded-full object-cover mx-auto border-4" style="border-color:var(--accent);" />
          <div class="absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center" style="background:var(--accent);">
            <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
          </div>
        </div>
        <h2 class="font-display font-bold text-2xl mb-1">Clara & Xelion</h2>
        <p class="text-sm mb-1" style="color:var(--accent)">@Clara&Xelion</p>
        <p class="text-sm leading-relaxed" style="color:var(--text-secondary)">Anime enthusiast & developer. Building the best anime experience, one frame at a time. 🌸</p>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-2 mt-5">
          <div class="rounded-xl py-3" style="background:var(--bg-secondary);">
            <div class="font-display font-bold text-lg gradient-text" id="fav-count">0</div>
            <div class="text-xs" style="color:var(--text-secondary)">Favorit</div>
          </div>
          <div class="rounded-xl py-3" style="background:var(--bg-secondary);">
            <div class="font-display font-bold text-lg gradient-text">∞</div>
            <div class="text-xs" style="color:var(--text-secondary)">Ditonton</div>
          </div>
          <div class="rounded-xl py-3" style="background:var(--bg-secondary);">
            <div class="font-display font-bold text-lg gradient-text">S+</div>
            <div class="text-xs" style="color:var(--text-secondary)">Level</div>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="space-y-3 mb-6">
        <a href="https://wa.me/6288973461209" target="_blank" class="flex items-center justify-center gap-3 w-full py-3 rounded-xl font-semibold text-sm transition-all active:scale-95" style="background:linear-gradient(135deg,#25D366,#128C7E);color:white;">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Chat via WhatsApp
        </a>
        <button id="copy-btn" class="flex items-center justify-center gap-3 w-full py-3 rounded-xl font-semibold text-sm transition-all active:scale-95" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path stroke-linecap="round" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy Nomor HP
        </button>
        <button id="share-btn" class="flex items-center justify-center gap-3 w-full py-3 rounded-xl font-semibold text-sm transition-all active:scale-95" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share Website
        </button>
      </div>

      <!-- Favorites section -->
      <div>
        <h3 class="font-display font-bold text-base mb-3">Anime Favorit</h3>
        <div id="fav-list" class="grid grid-cols-3 gap-2"></div>
        <p id="fav-empty" class="text-sm text-center py-8" style="color:var(--text-secondary)">Belum ada favorit. Tambahkan dari halaman Anime! ❤️</p>
      </div>
    </div>
  </div>

</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50 flex items-stretch" style="height:64px;">
